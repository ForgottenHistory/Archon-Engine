    id: UpdateOwnerTexture
    path: Scripts/Map/Rendering/OwnerTextureDispatcher.cs
    startLine: 157
  assemblies:
  - MapAssembly
  namespace: Map.Rendering
  summary: >-
    Incremental update: queues compute shader dispatch into a CommandBuffer

    for only pixels of changed provinces. Non-blocking — no GPU sync stall.

    Falls back to full-map dispatch if pixel index not available.
  example: []
  syntax:
    content: public void UpdateOwnerTexture(ProvinceQueries provinceQueries, ushort[] changedProvinces, CommandBuffer cmd)
    parameters:
    - id: provinceQueries
      type: Core.Queries.ProvinceQueries
    - id: changedProvinces
      type: System.UInt16[]
    - id: cmd
      type: UnityEngine.Rendering.CommandBuffer
    content.vb: Public Sub UpdateOwnerTexture(provinceQueries As ProvinceQueries, changedProvinces As UShort(), cmd As CommandBuffer)
