  summary: >-
    Save adjacency data to disk cache.

    Format: [ADJC 4B][version 4B][provinceCount 4B][pairCount 4B][id1 ushort, id2 ushort]...

    Pairs are stored once (not bidirectional) — reader rebuilds both directions.
